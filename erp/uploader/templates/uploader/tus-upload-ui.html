<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TUS Upload Portal</title>
    <script src="https://unpkg.com/tus-js-client@latest/dist/tus.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 50%;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        h2 {
            margin: 0 0 20px;
            text-align: center;
        }

        .fileDir {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }


        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            width: 32.98%;
            margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 0.2s ease;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            text-align: center;
            color: #374151;
        }

        .success {
            color: #16a34a;
        }

        .error {
            color: #dc2626;
        }
    </style>
</head>

<body>



<div class="card">
    <h2>TUS File Upload</h2>
    <input type="text"  class="fileDir" value="bangla/movies/"  placeholder="movie/bangla/..." id="fileDir" >
    <p></p>
    <input type="file" id="fileInput" multiple>
    <div id="queue"></div>

    <button id="uploadBtn" onclick="uploadFile()">
        Upload File
    </button>

    <button onclick="pauseUpload()">Pause</button>
    <button onclick="resumeUpload()">Resume</button>

    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <div class="status" id="status"></div>
    <hr>

<h3>Uploaded Files</h3>
<ul id="fileList"></ul>
</div>

<script>

let currentFile = null;
let currentUpload = null;
let uploadedFiles = new Set();

const API_URL = "http://192.168.1.52:8000/upload/";

const fileInput = document.getElementById("fileInput");
const btn = document.getElementById("uploadBtn");
const statusBox = document.getElementById("status");
const progressBar = document.getElementById("progress");

function setStatus(message, type = "") {
    statusBox.innerText = message;
    statusBox.className = "status " + type;
}

function setProgress(value) {
    progressBar.style.width = value + "%";
}

fileInput.onchange = () => {
    const queue = document.getElementById("queue");
    queue.innerHTML = "";

    [...fileInput.files].forEach(f => {
        const div = document.createElement("div");
        div.innerText = "📄 " + f.name;
        queue.appendChild(div);
    });
};

async function uploadFile() {
    const fileDir = document.getElementById("fileDir").value.trim();
    currentFile = fileInput.files[0];
    const file = currentFile;

    if (!file) {
        setStatus("Select file", "error");
        return;
    }

    // ❌ BLOCK DUPLICATE FILE
    if (uploadedFiles.has(file.name)) {
        setStatus("⚠ File already uploaded!", "error");
        return;
    }

    // ❌ PREVENT MULTIPLE CREATION
    if (currentUpload) {
        setStatus("Upload already in progress", "error");
        return;
    }

    currentFile = file;

    currentUpload = new tus.Upload(file, {
        endpoint: "http://172.20.10.165/files/",
        {#endpoint: "http://103.204.82.239:1080/files/",#}

        retryDelays: [0, 3000, 5000, 10000],

        metadata: {
            filename: file.name,
            filetype: file.type
        },

        onProgress: function (bytesUploaded, bytesTotal) {
            let percent = Math.floor((bytesUploaded / bytesTotal) * 100);
            setProgress(percent);
        },

        onError: function (error) {
            setStatus("Upload failed ❌", "error");
            console.error(error);
        },

        onSuccess: async function   () {
            setStatus("Upload complete ✔", "success");
            await  saveToDjango(file.name, currentUpload.url, fileDir);
            uploadedFiles.add(file.name); // ✔ mark as uploaded
            resetForm(); // 🔥 clear UI
            loadFiles();
        }
    });

    currentUpload.start();
    setStatus("Uploading ▶");
}

async function loadFilesOld() {
    try {
        const res = await fetch("http://192.168.1.52:8000/files/?t=" + Date.now(), {
            cache: "no-store"
        });

        const files = await res.json();

        const list = document.getElementById("fileList");
        list.innerHTML = "";

         files.forEach((file, index) => {
            const li = document.createElement("li");

            li.innerHTML = `
                ${index + 1}. 📄 ${file.filename}
                <a href="${file.tus_url}" target="_blank">Open</a>
            `;

            list.appendChild(li);
        });

    } catch (err) {
        console.error("Failed to load files:", err);
    }
}

async function loadFiles() {
    try {
        const res = await fetch("http://192.168.1.52:8000/files/?t=" + Date.now());
        const files = await res.json();
        const list = document.getElementById("fileList");
        list.innerHTML = "";
        uploadedFiles.clear(); // reset cache
        //console.log(files)
        files.forEach((file, index) => {
            uploadedFiles.add(file.filename); // 🔥 track uploaded
            const li = document.createElement("li");
            li.innerHTML = `
                ${index + 1}.
                ${getFileIcon(file.filename)}
                <a href="${file.tus_url}" target="_blank">Open</a>
                <button onclick="deleteFile(${file.id})" style="width:10%;margin-left:10px;background-color:#FF5F15;height:30px;padding: 0px;">Delete</button>
                 ${file.filename}
            `;
            list.appendChild(li);
        });
    } catch (err) {
        console.error("Failed to load files:", err);
    }
}

async function saveToDjango(filename, tus_url, fileDir) {

    const res = await fetch("http://192.168.1.52:8000/save-file/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            filename: filename,
            tus_url: tus_url,
            file_dir : fileDir,
            parent_id : parent_id
        })
    });

    return await res.json();
}

function pauseUpload() {
    if (currentUpload) {
        currentUpload.abort();
        setStatus("Upload paused ⏸");
    }
}

function resumeUploadOld() {
    if (!currentUpload) {
        setStatus("No upload to resume ❌", "error");
        return;
    }

    if (!currentFile) {
        setStatus("No file selected ❌", "error");
        return;
    }

    currentUpload = new tus.Upload(currentFile, {
        endpoint: "http://localhost:108/files/",
        retryDelays: [0, 3000, 5000, 10000],

        metadata: {
            filename: currentFile.name,
            filetype: currentFile.type
        },

        onError: function (error) {
            setStatus("Resume failed ❌", "error");
            console.error(error);
        },

        onProgress: function (bytesUploaded, bytesTotal) {
            let percent = Math.floor((bytesUploaded / bytesTotal) * 100);
            setProgress(percent);
        },
        onSuccess: async function () {
            setStatus("Upload complete ✔", "success");
            await saveToDjango(file.name, currentUpload.url);
            currentFile = null;
            currentUpload = null;
            resetForm();
            setTimeout(async () => {
                await loadFiles();
            }, 300);
        }

    });

    currentUpload.start();
    setStatus("Resuming upload ▶");
}

function resumeUpload() {
    if (!currentUpload) {
        setStatus("No upload to resume ❌", "error");
        return;
    }
    currentUpload.start();
    setStatus("Resuming upload ▶");
}

function resetForm() {
    fileInput.value = "";        // clear input
    currentFile = null;
    currentUpload = null;
    document.getElementById("queue").innerHTML = "";
    setProgress(0);
}

async function deleteFile(id) {
    if (!confirm("Are you sure you want to delete this file?")) return;

    try {
        const res = await fetch(`http://192.168.1.52:8000/delete-file/${id}/`, {
            method: "DELETE"
        });

        const data = await res.json();

        if (data.status === "ok") {
            setStatus("File deleted ✔", "success");
            loadFiles();
        } else {
            setStatus("Delete failed ❌", "error");
        }

    } catch (err) {
        console.error(err);
        setStatus("Delete error ❌", "error");
    }
}

function getFileIcon(filename) {
    if (!filename) return "📄";

    const ext = filename.split('.').pop().toLowerCase();

    const icons = {
        // documents
        pdf: "📕",
        doc: "📄",
        docx: "📄",
        txt: "📝",

        // excel
        xls: "📊",
        xlsx: "📊",
        csv: "📑",

        // images
        jpg: "🖼️",
        jpeg: "🖼️",
        png: "🖼️",
        gif: "🖼️",

        // video
        mp4: "🎬",
        mkv: "🎬",
        mov: "🎬",
        avi: "🎬",
        flv: "🎬",

        // audio
        mp3: "🎵",
        wav: "🎵",

        // archive
        zip: "🗜️",
        rar: "🗜️",
        tar: "🗜️",
        gz: "🗜️",
    };

    return icons[ext] || "📁";
}

loadFiles();
</script>

</body>
</html>
