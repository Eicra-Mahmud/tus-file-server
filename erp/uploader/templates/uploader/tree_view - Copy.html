<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Windows File Explorer</title>

    <style>
body {
    margin: 0;
    font-family: Segoe UI, Arial;
    display: flex;
    height: 100vh;
}

/* LEFT TREE */
#sidebar {
    width: 250px;
    background: #f3f3f3;
    border-right: 1px solid #ddd;
    padding: 10px;
    overflow: auto;
}

.tree-folder {
    padding: 6px 10px;
    cursor: pointer;
    border-radius: 4px;
}

.tree-folder:hover {
    background: #dbe9ff;
}

/* RIGHT PANEL */
#main {
    flex: 1;
    padding: 15px;
    overflow: auto;
}

/* PATH */
#path {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
}

/* ================= MEDIUM GRID ================= */
#view {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
}

/* ================= MEDIUM FOLDER ================= */
.folder {
    width: 110px;
    height: 95px;
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 6px;
}

.folder:hover {
    background: #e6f0ff;
}

/* ================= MEDIUM FILE ================= */
.file {
    width: 110px;
    height: 95px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: #333;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    border-radius: 6px;
}

.file:hover {
    background: #e6f0ff;
}

.icon {
    font-size: 28px;   /* 🔥 THIS FIXES SMALL ICON ISSUE */
    line-height: 1;
    margin-bottom: 6px;
}

.label {
    font-size: 12px;
    word-break: break-word;
}

/* keep your existing medium size */
.folder, .file {
    width: 110px;
    height: 95px;
    text-align: center;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 6px;
}

</style>

</head>

<body>

<!-- LEFT TREE -->
<div id="sidebar"></div>

<!-- RIGHT CONTENT -->
<div id="main">

    <div id="path">🏠 Root</div>
    <div id="view"></div>

</div>

<script>

let TREE = {};
let currentNode = {};
let stack = [];

async function loadTree() {

    const res = await fetch("http://192.168.1.52:8000/file-tree/");
    TREE = await res.json();

    currentNode = TREE;

    renderSidebar();
    renderMain();
}

/* ================= LEFT TREE ================= */
function renderSidebar() {

    let html = "";

    function walk(node, prefix = []) {

        for (let key in node) {

            if (key === "files") continue;

            let path = [...prefix, key];

            html += `
                <div class="tree-folder" onclick="openFolderByPath('${path.join('|')}')">
                    📁 ${key}
                </div>
            `;

            walk(node[key], path);
        }
    }

    walk(TREE);

    document.getElementById("sidebar").innerHTML = html;
}

/* ================= RIGHT VIEW ================= */
function renderMain() {

    let html = "";

    // folders
    for (let key in currentNode) {

        if (key !== "files") {

            html += `
                <div class="folder" onclick="openFolder('${key}')">
                    📁 ${key}
                </div>
            `;
        }
    }

    // files
    if (currentNode.files) {

        currentNode.files.forEach(file => {

            const name = file?.name || file;
            const id = file?.id;

            const url = id
                ? "http://localhost:108/files/" + id
                : "#";

            html += `
                <a href="${url}" target="_blank" class="file">
                    📄<br>${name}
                </a>
            `;
        });
    }

    document.getElementById("view").innerHTML = html;

    document.getElementById("path").innerText =
        "📂 /" + (stack.join("/") || "Root");
}

/* ================= OPEN FOLDER ================= */
function openFolder(name) {

    stack.push(name);
    currentNode = currentNode[name];

    renderMain();
}

/* ================= TREE NAV ================= */
function openFolderByPath(path) {

    let parts = path.split("|");

    currentNode = TREE;
    stack = [];

    for (let p of parts) {
        stack.push(p);
        currentNode = currentNode[p];
    }

    renderMain();
}

loadTree();

</script>

</body>
</html>
